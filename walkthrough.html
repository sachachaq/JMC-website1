<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JMC Domino's</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="portal.css?v=9">
  <script src="portal-theme.js"></script>
</head>
<body>

  <!-- PORTAL HEADER -->
  <header class="portal-header">
    <div class="portal-header-inner">
      <a class="portal-brand" href="dashboard.html">
        <img src="logo.png" alt="JMC">
      </a>
      <div class="portal-user">
        <div class="portal-user-info">
          <span class="welcome-text" id="welcomeText"></span>
          <span class="role-badge" id="roleBadge"></span>
        </div>
        <button class="btn-dark-toggle" title="Toggle theme" onclick="toggleDarkMode()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" data-theme-icon>
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="btn-logout" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </header>

  <!-- GRADE BAR -->
  <div class="grade-bar">
    <div class="grade-bar-inner">
      <div class="grade-meta">
        <span class="grade-eyebrow">Current Grade</span>
        <span class="grade-status" id="gradeStatus">Not yet scored</span>
      </div>
      <div class="grade-track-outer">
        <div class="grade-track-fill" id="gradeTrackFill"></div>
      </div>
      <span class="grade-number" id="gradeNumber">—</span>
    </div>
  </div>

  <!-- WALKTHROUGH CONTENT -->
  <main class="walkthrough-content">

    <!-- TITLE SECTION -->
    <div class="wt-title-card">
      <h2>Store Walkthrough Form</h2>
      <div class="wt-form-grid">
        <div class="wt-form-group" id="grp-storeNumber">
          <label for="storeNumber">Store Number <span style="color:#C62828">*</span></label>
          <select id="storeNumber">
            <option value="">Select store…</option>
          </select>
        </div>
        <div class="wt-form-group" id="grp-storeName">
          <label for="storeName">Store Name</label>
          <input type="text" id="storeName" readonly placeholder="Auto-filled from store number">
        </div>
        <div class="wt-form-group" id="grp-conductedOn">
          <label for="conductedOn">Conducted On <span style="color:#C62828">*</span></label>
          <input type="datetime-local" id="conductedOn">
        </div>
        <div class="wt-form-group" id="grp-preparedBy">
          <label for="preparedBy">Prepared By <span style="color:#C62828">*</span></label>
          <input type="text" id="preparedBy" placeholder="Your name">
        </div>
      </div>
    </div>

    <!-- QUESTION SECTIONS (rendered by JS) -->
    <div id="sectionsContainer"></div>

    <!-- NOTES + NOTEWORTHY -->
    <div class="wt-notes-card">
      <h3>Additional Notes</h3>
      <textarea id="notesText" placeholder="Include any additional observations, follow-up items, or context about this walkthrough…"></textarea>

      <div class="noteworthy-row">
        <label>Does this store have something noteworthy to share with the broader team?</label>
        <div class="wt-toggle-group" id="toggle-noteworthy">
          <button type="button" class="wt-toggle-btn" data-qid="noteworthy" data-val="Yes">Yes</button>
          <button type="button" class="wt-toggle-btn" data-qid="noteworthy" data-val="No">No</button>
        </div>
      </div>
    </div>

    <!-- SUBMIT -->
    <div class="wt-submit-area">
      <button type="button" class="btn-submit-wt" id="submitBtn">Submit Walkthrough</button>
      <span class="draft-indicator" id="draftIndicator"></span>
      <p class="submit-error" id="submitError">Please complete all required fields and answer all 35 questions before submitting.</p>
    </div>

  </main>

  <!-- SUCCESS OVERLAY -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-box">
      <div class="success-icon">&#10003;</div>
      <h2>Walkthrough Submitted!</h2>
      <p class="sub">Your walkthrough has been saved successfully. Great work keeping our standards high.</p>
      <div class="success-meta" id="successMeta"></div>
      <div class="success-actions">
        <a href="dashboard.html" class="btn-success-dashboard">&#8592; Back to Dashboard</a>
        <button type="button" class="btn-success-new" id="newWalkthroughBtn">Start New Walkthrough</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-client.js"></script>
  <script src="transitions.js"></script>
  <script src="auth.js"></script>
  <script src="walkthrough-data.js"></script>
  <script src="image-upload.js"></script>
  <script src="inspection-engine.js"></script>
  <script>
    // ---- Auth ----
    const session = requireAuth();
    if (!session) { /* redirected */ }

    document.getElementById('welcomeText').textContent = 'Welcome, ' + session.username;
    const badge = document.getElementById('roleBadge');
    badge.textContent = session.role === 'mastermind' ? 'The Mastermind' : session.role === 'admin' ? 'Admin' : 'Supervisor';
    badge.className = 'role-badge ' + session.role;

    // ---- Alias engine state (same objects by reference — no copies) ----
    const IE           = InspectionEngine;
    const answers      = IE.answers;       // template uses answers[qid] directly
    const questionNotes = IE.questionNotes;

    // ---- Helper: read current header fields ----
    function getFormFields() {
      return {
        storeNumber: document.getElementById('storeNumber').value,
        storeName:   document.getElementById('storeName').value,
        conductedOn: document.getElementById('conductedOn').value,
        preparedBy:  document.getElementById('preparedBy').value.trim(),
        notes:       document.getElementById('notesText').value.trim()
      };
    }

    // ---- Note zone ----
    function _syncNoteBtnLabel(qid) {
      const btn = document.getElementById('note-btn-' + qid);
      if (!btn) return;
      const val = questionNotes[qid] || '';
      btn.querySelector('.note-btn-label').textContent = val.trim() ? 'Note added' : 'Add Note';
      btn.classList.toggle('note-btn-has-note', !!val.trim());
    }

    function createNoteZone(qid) {
      const zone = document.createElement('div');
      zone.className = 'note-zone';
      zone.id = 'note-zone-' + qid;

      const btnRow = document.createElement('div');
      btnRow.className = 'note-btn-row';

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'note-btn';
      btn.id = 'note-btn-' + qid;
      btn.innerHTML =
        '<svg class="note-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M12 20h9"/>' +
          '<path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>' +
        '</svg>' +
        '<span class="note-btn-label">Add Note</span>';

      const expand = document.createElement('div');
      expand.className = 'note-expand';
      expand.id = 'note-expand-' + qid;
      expand.style.display = 'none';

      const ta = document.createElement('textarea');
      ta.className = 'note-textarea';
      ta.id = 'note-ta-' + qid;
      ta.placeholder = 'Add a note for this item\u2026';
      ta.rows = 2;

      ta.addEventListener('input', function () {
        questionNotes[qid] = ta.value;
        _syncNoteBtnLabel(qid);
        IE.scheduleSave(getFormFields);
      });

      btn.addEventListener('click', function () {
        const isOpen = expand.style.display !== 'none';
        if (isOpen && !ta.value.trim()) {
          expand.style.display = 'none';
          zone.classList.remove('note-zone-open');
        } else {
          expand.style.display = 'block';
          zone.classList.add('note-zone-open');
          ta.focus();
        }
      });

      expand.appendChild(ta);
      btnRow.appendChild(btn);
      zone.appendChild(btnRow);
      zone.appendChild(expand);
      return zone;
    }

    // ---- Populate store dropdown ----
    (function () {
      const sel = document.getElementById('storeNumber');
      STORE_NUMBERS.forEach(function (s) {
        const opt = document.createElement('option');
        opt.value = s.number;
        opt.textContent = s.number;
        sel.appendChild(opt);
      });
    })();

    // Store number → name
    document.getElementById('storeNumber').addEventListener('change', function () {
      const found = STORE_NUMBERS.find(s => s.number === this.value);
      document.getElementById('storeName').value = found ? found.name : '';
      IE.scheduleSave(getFormFields);
    });

    // Default conductedOn to now
    (function () {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const local = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate()) +
                    'T' + pad(now.getHours()) + ':' + pad(now.getMinutes());
      document.getElementById('conductedOn').value = local;
    })();

    // Pre-fill prepared by
    document.getElementById('preparedBy').value = session.username;

    // Field auto-save hooks
    ['conductedOn', 'preparedBy'].forEach(function (id) {
      document.getElementById(id).addEventListener('input', function () {
        IE.scheduleSave(getFormFields);
      });
    });
    document.getElementById('notesText').addEventListener('input', function () {
      IE.scheduleSave(getFormFields);
    });

    // ---- Render question sections ----
    (function () {
      const container = document.getElementById('sectionsContainer');
      FORM_SECTIONS.forEach(function (section) {
        const card = document.createElement('div');
        card.className = 'wt-section';
        card.id = 'section-' + section.id;

        const header = document.createElement('div');
        header.className = 'wt-section-header';
        header.innerHTML =
          '<div class="wt-section-dot" style="background:' + section.color + '"></div>' +
          '<span class="wt-section-title">' + section.title + '</span>' +
          '<span class="wt-section-count">' + section.questions.length + ' questions</span>';

        card.appendChild(header);

        section.questions.forEach(function (q) {
          const row = document.createElement('div');
          row.className = 'wt-question-row';
          row.id = 'row-' + q.id;

          const text = document.createElement('span');
          text.className = 'wt-question-text';
          text.textContent = q.text;

          const toggleGroup = document.createElement('div');
          toggleGroup.className = 'wt-toggle-group';
          toggleGroup.id = 'toggle-' + q.id;

          ['Yes', 'No'].forEach(function (val) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'wt-toggle-btn';
            btn.dataset.qid = q.id;
            btn.dataset.val = val;
            btn.textContent = val;
            toggleGroup.appendChild(btn);
          });

          row.appendChild(text);
          row.appendChild(toggleGroup);
          card.appendChild(row);
          card.appendChild(createUploadZone(q.id));
          card.appendChild(createNoteZone(q.id));
        });

        container.appendChild(card);
      });
    })();

    // ---- Toggle button handler (event delegation) ----
    document.addEventListener('click', function (e) {
      const btn = e.target.closest('.wt-toggle-btn');
      if (!btn) return;

      const qid = btn.dataset.qid;
      const val = btn.dataset.val;
      const deselecting = answers[qid] === val;

      if (deselecting) {
        delete answers[qid];
      } else {
        answers[qid] = val;
      }

      const group = document.getElementById('toggle-' + qid);
      group.querySelectorAll('.wt-toggle-btn').forEach(function (b) {
        b.classList.remove('yes-active', 'no-active');
      });
      if (!deselecting) {
        btn.classList.add(val === 'Yes' ? 'yes-active' : 'no-active');
      }

      const row = document.getElementById('row-' + qid);
      if (row) {
        row.classList.remove('answer-no', 'unanswered');
        if (!deselecting && val === 'No') row.classList.add('answer-no');
      }

      setUploadZoneState(qid, (!deselecting && val === 'No') ? 'encouraged' : 'default');
      updateGradeBar();
      IE.scheduleSave(getFormFields);
    });

    // ---- Grade bar ----
    function getGradeColor(pct) {
      if (pct >= 80) return 'green';
      if (pct >= 60) return 'yellow';
      return 'red';
    }

    function updateGradeBar() {
      const total    = ALL_QUESTION_IDS.length;
      const answered = ALL_QUESTION_IDS.filter(id => answers[id]).length;
      const yesCount = ALL_QUESTION_IDS.filter(id => answers[id] === 'Yes').length;
      const hasAnswers = answered > 0;
      const pct   = hasAnswers ? Math.round((yesCount / answered) * 100) : 0;
      const color = hasAnswers ? getGradeColor(pct) : 'none';
      const labels = { green: 'Passing', yellow: 'Needs Work', red: 'At Risk' };

      document.getElementById('gradeNumber').textContent    = hasAnswers ? pct + '%' : '—';
      document.getElementById('gradeNumber').className      = 'grade-number' + (hasAnswers ? ' gn-' + color : '');
      document.getElementById('gradeTrackFill').style.width = (hasAnswers ? pct : 0) + '%';
      document.getElementById('gradeTrackFill').className   = 'grade-track-fill' + (hasAnswers ? ' gf-' + color : '');
      document.getElementById('gradeStatus').textContent    = hasAnswers
        ? yesCount + ' / ' + answered + ' passing\u2002\u00b7\u2002' + labels[color] + '\u2002\u00b7\u2002' + answered + ' / ' + total + ' answered'
        : 'Not yet scored';
    }

    // ---- Init engine (must happen after sections are rendered) ----
    const _draftData = IE.init(WALKTHROUGH_CONFIG, session);

    // ---- Restore draft if resuming ----
    if (_draftData) {
      _restoreDraft(_draftData);
    }

    function _restoreDraft(draft) {
      // Header fields
      if (draft.storeNumber) {
        const sel = document.getElementById('storeNumber');
        sel.value = draft.storeNumber;
        sel.dispatchEvent(new Event('change'));
      }
      if (draft.conductedOn) document.getElementById('conductedOn').value = draft.conductedOn;
      if (draft.preparedBy)  document.getElementById('preparedBy').value  = draft.preparedBy;
      if (draft.notes)       document.getElementById('notesText').value   = draft.notes;

      // Answers
      Object.entries(draft.answers || {}).forEach(function ([qid, val]) {
        answers[qid] = val;
        const group = document.getElementById('toggle-' + qid);
        if (group) {
          group.querySelectorAll('.wt-toggle-btn').forEach(function (b) {
            b.classList.remove('yes-active', 'no-active');
            if (b.dataset.val === val) b.classList.add(val === 'Yes' ? 'yes-active' : 'no-active');
          });
        }
        const row = document.getElementById('row-' + qid);
        if (row) {
          row.classList.remove('answer-no', 'unanswered');
          if (val === 'No') row.classList.add('answer-no');
        }
        if (val === 'No') setUploadZoneState(qid, 'encouraged');
      });

      // Question notes
      Object.entries(draft.questionNotes || {}).forEach(function ([qid, note]) {
        if (!note) return;
        questionNotes[qid] = note;
        const ta = document.getElementById('note-ta-' + qid);
        if (ta) {
          ta.value = note;
          const expand = document.getElementById('note-expand-' + qid);
          if (expand) expand.style.display = 'block';
          const zone = document.getElementById('note-zone-' + qid);
          if (zone) zone.classList.add('note-zone-open');
        }
        _syncNoteBtnLabel(qid);
      });

      // Images (base64 from localStorage)
      Object.entries(draft.images || {}).forEach(function ([qid, imgs]) {
        (imgs || []).forEach(function (img) {
          restoreImageToZone(qid, img);
        });
      });

      updateGradeBar();
    }

    // ---- beforeunload: sync localStorage save ----
    window.addEventListener('beforeunload', function () {
      IE.saveSync(getFormFields);
    });

    // ---- Submit ----
    document.getElementById('submitBtn').addEventListener('click', async function () {
      const storeNumber = document.getElementById('storeNumber').value;
      const storeName   = document.getElementById('storeName').value;
      const conductedOn = document.getElementById('conductedOn').value;
      const preparedBy  = document.getElementById('preparedBy').value.trim();
      const errorEl     = document.getElementById('submitError');
      const submitBtn   = document.getElementById('submitBtn');

      // --- Validation ---
      let valid = true;
      ['storeNumber', 'conductedOn', 'preparedBy'].forEach(function (fieldId) {
        const grp = document.getElementById('grp-' + fieldId);
        const el  = document.getElementById(fieldId);
        if (!el.value.trim()) { grp.classList.add('error'); valid = false; }
        else { grp.classList.remove('error'); }
      });

      const unanswered = ALL_QUESTION_IDS.filter(function (id) { return !answers[id]; });
      if (unanswered.length > 0) {
        valid = false;
        ALL_QUESTION_IDS.forEach(function (id) {
          const row = document.getElementById('row-' + id);
          if (row) row.classList.toggle('unanswered', !answers[id]);
        });
      } else {
        ALL_QUESTION_IDS.forEach(function (id) {
          const row = document.getElementById('row-' + id);
          if (row) row.classList.remove('unanswered');
        });
      }

      if (!valid) {
        errorEl.classList.add('show');
        const firstError = document.querySelector('.wt-form-group.error, .wt-question-row.unanswered');
        if (firstError) firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      errorEl.classList.remove('show');

      // --- Build submission object before any async work ---
      const submission = {
        id:             IE.draftId,
        username:       session.username,
        inspectionType: WALKTHROUGH_CONFIG.templateName,
        dateSubmitted:  new Date().toISOString(),
        storeNumber:    storeNumber,
        storeName:      storeName,
        conductedOn:    conductedOn,
        preparedBy:     preparedBy,
        notes:          document.getElementById('notesText').value.trim(),
        answers:        Object.assign({}, answers),
        images:         ImageStore.all(),
        questionNotes:  Object.assign({}, questionNotes)
      };

      // --- Loading state ---
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving\u2026';

      let result;
      try {
        result = await saveSubmission(submission, function (status) {
          submitBtn.textContent = status;
        });
      } catch (e) {
        // Unexpected exception (e.g. localStorage quota exceeded before Supabase call)
        console.error('[Submit] Unexpected error:', e);
        result = { localOk: false, cloudOk: false, error: e.message || 'Unknown error' };
      } finally {
        // Always clear loading state regardless of outcome
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Walkthrough';
      }

      // --- Handle save failure ---
      if (!result || !result.localOk) {
        errorEl.textContent = 'Failed to save. Please try again.';
        errorEl.classList.add('show');
        return;
      }

      // --- Success: clean up draft, show overlay, auto-redirect ---
      IE.clearDraft();

      const noCount  = ALL_QUESTION_IDS.filter(function (id) { return answers[id] === 'No'; }).length;
      const yesCount = ALL_QUESTION_IDS.filter(function (id) { return answers[id] === 'Yes'; }).length;

      const cloudWarning = result.cloudOk ? '' :
        '<div class="success-meta-row" style="color:#b45309;font-size:0.8rem;border-top:1px solid var(--border,#e5e7eb);margin-top:0.5rem;padding-top:0.5rem;">' +
        '<span>&#9888; Cloud sync</span><span>Saved locally \u2014 will sync when reconnected</span></div>';

      document.getElementById('successMeta').innerHTML =
        '<div class="success-meta-row"><span>Store</span><span>' + storeNumber + ' \u2014 ' + storeName + '</span></div>' +
        '<div class="success-meta-row"><span>Submitted</span><span>' + new Date(submission.dateSubmitted).toLocaleString() + '</span></div>' +
        '<div class="success-meta-row"><span>Yes Answers</span><span style="color:var(--green);font-weight:700;">' + yesCount + '</span></div>' +
        '<div class="success-meta-row"><span>No Answers</span><span style="color:var(--red);font-weight:700;">' + noCount + '</span></div>' +
        (ImageStore.totalCount() > 0
          ? '<div class="success-meta-row"><span>Photos Attached</span><span style="color:#1a3fa0;font-weight:700;">' + ImageStore.totalCount() + '</span></div>'
          : '') +
        cloudWarning;

      document.getElementById('successOverlay').classList.add('show');

      // Auto-redirect to dashboard after 2.5 s
      setTimeout(function () {
        window.location.href = 'dashboard.html';
      }, 2500);
    });

    // ---- New walkthrough ----
    document.getElementById('newWalkthroughBtn').addEventListener('click', function () {
      window.location.href = 'walkthrough.html';
    });

  </script>
</body>
</html>
