<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JMC Domino's</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal.css?v=3">
</head>
<body>

  <div class="login-page">
    <a href="index.html" class="login-home-logo">
      <img src="logo.png" alt="JMC">
    </a>
    <div class="login-bg">
      <div class="login-blob login-blob-1"></div>
      <div class="login-blob login-blob-2"></div>
      <div class="login-blob login-blob-3"></div>
    </div>
    <div class="login-card">
      <div class="login-logo">
        <img src="logo.png" alt="JMC" class="login-logo-img">
      </div>
      <h1 class="login-title">Team Member Portal</h1>
      <p class="login-sub">Sign in to access your dashboard.</p>

      <div class="login-error" id="loginError">Invalid username or password. Please try again.</div>

      <form class="login-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" autocomplete="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-login">Sign In</button>
      </form>

      <p class="login-back">
        <a href="index.html">&larr; Back to main site</a>
      </p>
    </div>
  </div>

  <script src="users.js"></script>
  <script src="transitions.js"></script>
  <script src="auth.js"></script>
  <script>
    // Redirect if already logged in
    (function () {
      if (getSession()) {
        window.location.href = 'dashboard.html';
      }
    })();

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl  = document.getElementById('loginError');

      const user = findUser(username, password);
      if (user) {
        errorEl.classList.remove('show');
        setSession(user.username, user.role, user.displayName);
        localStorage.removeItem('jmc_theme');
        window.location.href = 'dashboard.html';
      } else {
        errorEl.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });
  </script>
</body>
</html>
